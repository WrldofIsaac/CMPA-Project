<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackWave | Music & Sound Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎧 TrackWave</h1>
  <p class="tagline">Discover sounds. Create vibes.</p>
  <button id="themeToggle" class="button">🌙 Dark Mode</button>
</header>

<!-- Login -->
<div class="auth-container">
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="authMessage"></p>
</div>
<!-- Hero Section -->
<section class="hero">
  <h2>Your Ultimate Sound Library</h2>
  <p>Explore trending music, premium sound packs, and creative audio tools—all in one place.</p>
</section>

<!-- Search -->
<div class="search-container">
  <div class="search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="🔍 Search songs, products, sounds..."
      autocomplete="off"
    />
    <div id="searchResults" class="search-results"></div>
  </div>
</div>
<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="openTab(event, 'songs')">Songs</button>
  <button class="tab" onclick="openTab(event, 'products')">Products</button>
  <button class="tab" onclick="openTab(event, 'sounds')">Sounds</button>
</div>

<script src="script.js"></script>
<div id="songs"></div>
<main>
  <!-- SONGS -->
  <div id="songs" class="tab-content active">
    <div class="card" onclick="openModal('🔥 New Releases: Stay updated with the latest music drops from top artists.')">New Releases</div>
    <div class="card" onclick="openModal('🎤 Artists: Browse top creators and rising stars.')">Artists</div>
    <div class="card" onclick="openModal('📈 Top Songs: Trending tracks everyone is listening to.')">Top Songs</div>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="tab-content">
    <div class="card" onclick="openModal('🎵 Tracks: Studio-quality music ready for your projects.')">Tracks</div>
    <div class="card" onclick="openModal('🌊 Pads Pack: Atmospheric textures for producers.')">Pads Pack</div>
    <div class="card" onclick="openModal('🎸 Guitar Bundle: Professional guitar tones.')">Guitar Bundle</div>
  </div>

  <!-- SOUNDS -->
  <div id="sounds" class="tab-content">
    <div class="card" onclick="openModal('🌌 Ambient Pads: Soft textures for background vibes.')">Ambient Pads</div>
    <div class="card" onclick="openModal('🔁 Loops: Ready-to-use loops for quick production.')">Loops</div>
    <div class="card" onclick="openModal('📦 Templates: Pre-built DAW templates.')">Templates</div>
  </div>
</main>

<!-- Footer -->
<footer>
  <p>© 2026 TrackWave. All rights reserved.</p>
</footer>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <p id="modalText"></p>
  </div>
</div>

<script>
const toggleBtn = document.getElementById("themeToggle");

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");
  toggleBtn.textContent = document.body.classList.contains("light-mode")
    ? "☀️ Light Mode"
    : "🌙 Dark Mode";
});

function openTab(event, tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));

  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function () {
  const filter = searchInput.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(filter) ? "block" : "none";
  });
});

function openModal(text) {
  document.getElementById("modalText").textContent = text;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>

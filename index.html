<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackWave</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TrackWave</h1>
  <button id="themeToggle" class="button">🌙 Dark Mode</button>
</header>

<!-- Search Bar -->
<div class="search-container">
  <input type="text" id="searchInput" placeholder="Search songs, products, sounds..." />
</div>

<Tabs>
<div class="tabs">
  <button class="tab active" onclick="openTab(event, 'songs')">Songs</button>
  <button class="tab" onclick="openTab(event, 'products')">Products</button>
  <button class="tab" onclick="openTab(event, 'sounds')">Sounds</button>
</div>

<main>
  <div id="songs" class="tab-content active">
    <div class="card" onclick="openModal('New Releases - Latest trending music drops.')">New Releases</div>
    <div class="card" onclick="openModal('Artist - Explore top artists and their tracks.')">Artist</div>
    <div class="card" onclick="openModal('Top Songs - Most popular songs right now.')">Top Songs</div>
  </div>

  <div id="products" class="tab-content">
    <div class="card" onclick="openModal('Tracks - High quality music tracks available.')">Tracks</div>
    <div class="card" onclick="openModal('Pads Pack - Ambient pad sounds for producers.')">General Pads Pack</div>
    <div class="card" onclick="openModal('Guitar Bundle - Premium guitar tones.')">Guitar Tone Bundle</div>
  </div>

  <div id="sounds" class="tab-content">
    <div class="card" onclick="openModal('Ambient Pads - Soft background textures.')">Ambient Pads</div>
    <div class="card" onclick="openModal('Loops - Ready-to-use sound loops.')">Loops</div>
    <div class="card" onclick="openModal('Templates - Pre-built project templates.')">Templates</div>
  </div>
</main>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <p id="modalText"></p>
  </div>
</div>

<script>

// Theme toggle
const toggleBtn = document.getElementById("themeToggle");

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");
  toggleBtn.textContent = document.body.classList.contains("light-mode")
    ? "☀️ Light Mode"
    : "🌙 Dark Mode";
});

// Tabs
function openTab(event, tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));

  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

// Search
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function () {
  const filter = searchInput.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(filter) ? "block" : "none";
  });
});

// Modal
function openModal(text) {
  document.getElementById("modalText").textContent = text;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
}
</script>

</html>

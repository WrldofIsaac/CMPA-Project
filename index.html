<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackWave</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TrackWave</h1>
  <button id="themeToggle" class="button">🌙 Dark Mode</button>
</header>

<!-- Search Bar -->
<div class="search-container">
  <input type="text" id="searchInput" placeholder="Search songs, products, sounds..." />
</div>

<Tabs>
<div class="tabs">
  <button class="tab active" onclick="openTab('songs')">Songs</button>
  <button class="tab" onclick="openTab('products')">Products</button>
  <button class="tab" onclick="openTab('sounds')">Sounds</button>
</div>

<main>
  <!-- Songs -->
  <div id="songs" class="tab-content active">
    <div class="card">New Releases</div>
    <div class="card">Artist</div>
    <div class="card">Top songs</div>
  </div>

  <!-- Products -->
  <div id="products" class="tab-content">
    <div class="card">Tracks</div>
    <div class="card">General Pads Pack</div>
    <div class="card">Guitar Tone Bundle</div>
  </div>

  <!-- Sounds -->
  <div id="sounds" class="tab-content">
    <div class="card">Ambient Pads </div>
    <div class="card">Loops </div>
    <div class="card">Templates </div>
  </div>
</main>

<script>
// Theme toggle Button
const toggleBtn = document.getElementById("themeToggle");

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");

  toggleBtn.textContent = document.body.classList.contains("light-mode")
    ? "☀️ Light Mode"
    : "🌙 Dark Mode";
});

// Tabs
function openTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));

  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

// Search functionality
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function () {
  const filter = searchInput.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(filter) ? "block" : "none";
  });
});
</script>

</html>
